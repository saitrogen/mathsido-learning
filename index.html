<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mathsido — Interactive Learning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-border: #d4d1ca;
      --color-text: #28251d;
      --color-text-muted: #7a7974;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-draft-bg: #f3f0ec;
      --color-draft-text: #7a7974;
      --font-display: 'Instrument Serif', Georgia, serif;
      --font-body: 'DM Sans', sans-serif;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --shadow-sm: 0 1px 2px rgba(40,37,29,0.06);
      --shadow-md: 0 4px 12px rgba(40,37,29,0.08);
    }
    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-border: #393836;
      --color-text: #cdccca;
      --color-text-muted: #797876;
      --color-primary: #4f98a3;
      --color-primary-hover: #227f8b;
      --color-draft-bg: #22211f;
      --color-draft-text: #5a5957;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      border-bottom: 1px solid var(--color-border);
      background: var(--color-surface);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-display);
      font-size: 1.4rem;
      color: var(--color-primary);
      text-decoration: none;
    }
    .theme-toggle {
      background: none;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: 0.4rem 0.6rem;
      cursor: pointer;
      color: var(--color-text-muted);
      font-size: 1rem;
      transition: all 180ms ease;
    }
    .theme-toggle:hover { border-color: var(--color-primary); color: var(--color-primary); }
    main { max-width: 900px; margin: 0 auto; padding: 3rem 1.5rem; }
    .hero { margin-bottom: 3rem; }
    .hero h1 {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1.1;
      margin-bottom: 0.75rem;
    }
    .hero p { color: var(--color-text-muted); font-size: 1.05rem; max-width: 55ch; }
    .grade-badge {
      display: inline-block;
      background: var(--color-primary);
      color: #fff;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }
    .subject-section { margin-bottom: 2.5rem; }
    .subject-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
      font-size: 1.1rem;
      font-weight: 600;
    }
    .chapters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(260px, 100%), 1fr));
      gap: 0.75rem;
    }
    .chapter-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      text-decoration: none;
      color: var(--color-text);
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      transition: box-shadow 180ms ease, border-color 180ms ease;
    }
    .chapter-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--color-primary);
    }
    .chapter-card.draft {
      background: var(--color-draft-bg);
      cursor: default;
      pointer-events: none;
    }
    .chapter-card.draft .chapter-title { color: var(--color-draft-text); }
    .chapter-num { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-muted); }
    .chapter-title { font-weight: 500; font-size: 0.95rem; }
    .chapter-status {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 0.4rem;
      color: var(--color-primary);
    }
    .chapter-card.draft .chapter-status { color: var(--color-draft-text); }
    footer {
      text-align: center;
      padding: 2rem;
      color: var(--color-text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--color-border);
      margin-top: 3rem;
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="Mathsido" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="28" rx="7" fill="var(--color-primary)"/>
        <path d="M7 20 L11 10 L14 16 L17 10 L21 20" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      Mathsido
    </a>
    <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">🌙</button>
  </header>

  <main>
    <div class="hero">
      <span class="grade-badge">Class 10 · Kerala SCERT</span>
      <h1>Learn at your own pace.</h1>
      <p>Interactive chapter experiences for Kerala State Board students. Tap any published chapter to begin.</p>
    </div>
    <div id="subjects-container">Loading chapters...</div>
  </main>

  <footer>Mathsido · Kerala SCERT Class 10 · Interactive Learning</footer>

  <script>
    (function(){
      const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
      let d=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
      r.setAttribute('data-theme',d);
      t&&t.addEventListener('click',()=>{
        d=d==='dark'?'light':'dark';
        r.setAttribute('data-theme',d);
        t.textContent=d==='dark'?'☀️':'🌙';
      });
    })();

    async function loadChapters() {
      const container = document.getElementById('subjects-container');
      try {
        const [subjectsRes, chaptersRes] = await Promise.all([
          fetch('./data/subjects.json'),
          fetch('./data/chapters.json')
        ]);
        const subjects = await subjectsRes.json();
        const chapters = await chaptersRes.json();

        container.innerHTML = subjects.map(subject => {
          const subjectChapters = chapters[subject.id] || [];
          return `
            <section class="subject-section">
              <div class="subject-header">
                <span>${subject.icon}</span>
                <span>${subject.title}</span>
              </div>
              <div class="chapters-grid">
                ${subjectChapters.map(ch => {
                  const isPublished = ch.status === 'published';
                  const href = `./${subject.id}/${ch.id}/`;
                  return `
                    <a href="${isPublished ? href : '#'}" class="chapter-card ${ch.status}" ${!isPublished ? 'aria-disabled="true"' : ''}>
                      <span class="chapter-num">Chapter ${ch.chapter}</span>
                      <span class="chapter-title">${ch.title}</span>
                      <span class="chapter-status">${isPublished ? '▶ Open' : 'Coming soon'}</span>
                    </a>
                  `;
                }).join('')}
              </div>
            </section>
          `;
        }).join('');
      } catch(e) {
        container.innerHTML = '<p style="color:var(--color-text-muted)">Could not load chapters. Please refresh.</p>';
      }
    }
    loadChapters();
  </script>
</body>
</html>
